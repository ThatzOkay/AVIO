# `cross build --target aarch64-unknown-linux-gnu -p avio` (run from the repo
# root, next to this file, so cross can see the whole workspace).
#
# Compiles the Rust side only - it does NOT produce a full Tauri bundle
# (AppImage/deb) or the avio-compositor meson binary. See docker/README.md.
[target.aarch64-unknown-linux-gnu]
dockerfile = "docker/cross-aarch64-unknown-linux-gnu.Dockerfile"

name: dependencies
run-name: 'dependencies → ${{ github.event_name == ''workflow_dispatch'' && (inputs.include_major && ''major'' || ''minor+patch'') || ''minor+patch'' }} on ${{ github.event_name == ''workflow_dispatch'' && inputs.branch || ''dev'' }}'

on:
  schedule:
   - cron: '0 20 * * 0'

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update'
        required: true
        default: 'dev'
        type: string
      include_major:
        description: 'Include major updates'
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update dependencies on ${{ github.event_name == 'workflow_dispatch' && inputs.branch || 'dev' }}
    runs-on: ubuntu-latest

    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || 'dev' }}

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ env.TARGET_BRANCH }}

      - name: Setup bun
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Collect available updates report
        id: report
        shell: bash
        run: |
          set -euo pipefail

          REPORT="$(bun outdated || true)"

          {
            echo 'report<<EOF'
            echo "$REPORT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update minor and patch only
        if: ${{ github.event_name == 'schedule' || inputs.include_major == false }}
        run: bun update

      - name: Update including majors
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_major == true }}
        run: bun update --latest

      - name: Check for dependency file changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- package.json bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute PR metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.include_major }}" == "true" ]]; then
            echo "branch=chore/deps-major" >> "$GITHUB_OUTPUT"
            echo "title=chore(deps): update dependencies (major)" >> "$GITHUB_OUTPUT"
          else
            echo "branch=chore/deps-minor" >> "$GITHUB_OUTPUT"
            echo "title=chore(deps): update dependencies" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          base: ${{ env.TARGET_BRANCH }}
          branch: ${{ steps.meta.outputs.branch }}
          delete-branch: true
          commit-message: ${{ steps.meta.outputs.title }}
          title: ${{ steps.meta.outputs.title }}
          body: |
            Automated dependency update.

            Target branch: `${{ env.TARGET_BRANCH }}`
            Include major updates: `${{ github.event_name == 'workflow_dispatch' && inputs.include_major || false }}`

            Outdated packages before applying changes:

            ```text
            ${{ steps.report.outputs.report }}
            ```

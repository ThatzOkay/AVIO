name: release

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'ID of successful build run (leave empty = latest on main)'
        required: false
      draft:
        description: 'Create as draft?'
        type: boolean
        default: true

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Pick build run ID
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "${{ github.event.inputs.build_run_id }}" ]]; then
            RUN=$(gh run list --repo "$REPO" \
                               --workflow build.yml \
                               -b main \
                               -s success \
                               -L 1 \
                               --json databaseId \
                               -q '.[0].databaseId')
          else
            RUN="${{ github.event.inputs.build_run_id }}"
          fi
          if [[ -z "$RUN" ]]; then
            echo "::error::No suitable build run found."
            exit 1
          fi
          echo "run_id=$RUN" >> "$GITHUB_OUTPUT"

      - name: Get commit SHA
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA=$(gh run view "${{ steps.pick.outputs.run_id }}" \
                 --repo "$REPO" \
                 --json headSha \
                 -q .headSha)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ steps.sha.outputs.sha }}
          fetch-depth: 1

      - name: Read version
        id: ver
        run: |
          VERSION=$(grep -oP '"version"\s*:\s*"\K[^"]+' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get release date (Europe/Berlin)
        id: rel_date
        run: |
          echo "date=$(TZ=Europe/Berlin date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "::error::Release with tag $TAG already exists."
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.pick.outputs.run_id }}
          path: release-assets
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Raw .app bundle directories (tauri-action's own "-app" artifacts) aren't meant for
      # distribution - the .dmg already packages them - and each one carries its own bundled
      # GStreamer copy, so same-named internal files (e.g. gst-plugin-scanner) collide between
      # the x64 and arm64 legs once every artifact's contents get flattened into one release.
      - name: Drop raw .app bundles
        run: find release-assets -type d -name "*.app" -prune -exec rm -rf {} +

      # Each matrix leg's own updater .sig only knows about its own platform, so there's no
      # single leg with the full picture - assemble one combined manifest here instead of
      # trusting any per-leg latest.json (which would also collide on the same filename once
      # every artifact's contents get flattened into the release, same class of bug as the
      # .app collision above). Only the well-documented bundler-side `.sig` naming convention
      # (<bundle>.sig, written by createUpdaterArtifacts) is relied on - see
      # https://v2.tauri.app/plugin/updater/ for the per-platform artifact names.
      - name: Build combined updater manifest
        id: manifest
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p pages-dist

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const repo = process.env.REPO;
          const version = process.env.VERSION;
          const root = 'release-assets';

          const archOf = (p) => {
            if (/arm64|aarch64/i.test(p)) return 'aarch64';
            if (/x64|x86_64|amd64/i.test(p)) return 'x86_64';
            return null;
          };

          const osOf = (bundleName) => {
            if (bundleName.endsWith('.AppImage')) return 'linux';
            if (bundleName.endsWith('.app.tar.gz')) return 'darwin';
            if (bundleName.endsWith('.msi') || bundleName.endsWith('.exe')) return 'windows';
            return null;
          };

          const walk = (dir) => {
            let out = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, entry.name);
              if (entry.isDirectory()) out = out.concat(walk(p));
              else if (entry.name.endsWith('.sig')) out.push(p);
            }
            return out;
          };

          const platforms = {};
          for (const sigPath of walk(root)) {
            const bundlePath = sigPath.slice(0, -'.sig'.length);
            const bundleName = path.basename(bundlePath);
            const os = osOf(bundleName);
            const arch = archOf(sigPath);
            if (!os || !arch) {
              console.log(`Skipping unrecognized updater artifact: ${sigPath}`);
              continue;
            }
            const key = `${os}-${arch}`;
            // Windows builds both .msi and .exe (nsis) for the same platform key - prefer msi.
            if (platforms[key] && bundleName.endsWith('.exe')) continue;

            platforms[key] = {
              signature: fs.readFileSync(sigPath, 'utf8').trim(),
              url: `https://github.com/${repo}/releases/download/v${version}/${bundleName}`,
            };
          }

          if (Object.keys(platforms).length === 0) {
            console.error('No updater artifacts (.sig files) found under release-assets/');
            process.exit(1);
          }

          const manifest = {
            version,
            notes: `See https://github.com/${repo}/releases/tag/v${version}`,
            pub_date: new Date().toISOString(),
            platforms,
          };

          fs.writeFileSync('pages-dist/latest.json', JSON.stringify(manifest, null, 2));
          console.log('platforms:', Object.keys(platforms));
          NODE

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.ver.outputs.version }}
          REL_DATE: ${{ steps.rel_date.outputs.date }}
          DRAFT: ${{ github.event.inputs.draft }}
        run: |
          TAG="v${VERSION}"

          args=(
            "$TAG"
            --repo "$REPO"
            --target "${{ steps.sha.outputs.sha }}"
            --title "v${VERSION} (${REL_DATE})"
            --notes "## Release Notes – v${VERSION}

          ### Fix

          ### Improvements

          ### Feature

          ### Chores"
          )

          if [[ "$DRAFT" == "true" ]]; then
            args+=(--draft)
          fi

          while IFS= read -r -d '' file; do
            args+=("$file")
          done < <(find release-assets -type f -not -name "latest.json" -print0)

          gh release create "${args[@]}"
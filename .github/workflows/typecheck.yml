name: typecheck

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, dev]

jobs:
  checks:
    name: Lint, Typecheck (Vue/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Setup latest Node.js 24.x
        uses: actions/setup-node@v7
        with:
          node-version: 24
          check-latest: true

      - name: Setup bun
        run: |
          set -euo pipefail
          curl -fsSL https://bun.com/install | bash
          BUN_BIN="$HOME/.bun/bin"
          # bun's installer only appends PATH to ~/.bash_profile, which this
          # non-login shell never sources - export it for the rest of this step,
          # and write to GITHUB_PATH for every later step.
          export PATH="$BUN_BIN:$PATH"
          echo "$BUN_BIN" >> "$GITHUB_PATH"
          echo "bun version: $(bun -v)"
          node -e "const v=require('child_process').execSync('bun -v').toString().trim(); if(!/^1\\./.test(v)){console.error('Expected bun 1.x, got', v); process.exit(1);} console.log('bun 1 OK');"

      - name: Resolve bun store path
        id: bun_store
        run: echo "path=~/.bun/install/cache" >> "$GITHUB_OUTPUT"

      - name: Cache bun store
        uses: actions/cache@v6
        with:
          path: ${{ steps.bun_store.outputs.path }}
          key: bun-store-${{ runner.os }}-x64-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-store-${{ runner.os }}-x64-

      - name: Install dependencies from lockfile
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run Biome checks (TS)
        run: bun run lint:check

      - name: Run ESLint (Vue)
        run: bun run lint:vue

      - name: Run TypeScript type-check
        run: bun run typecheck

  rust-lint:
    name: Clippy (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            protobuf-compiler \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            librtlsdr-dev \
            libasound2-dev \
            libfftw3-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # tauri-build's own build.rs checks that every `externalBin` in
      # tauri.conf.json already exists on disk, and that every `bundle.resources`
      # glob matches at least one file, whenever the `avio` crate is compiled at
      # all - not just during `tauri build`. `bun run tauri build` satisfies both
      # via beforeBuildCommand (the gst-host and avio-compositor sidecar scripts),
      # but plain `cargo clippy` bypasses that hook, so they're reproduced here.
      # The compositor placeholder doesn't need to be a real binary - clippy only
      # needs `compositor/**/*` to resolve to *something*, and building the real
      # thing would drag the whole meson/wlroots toolchain into a lint job.
      - name: Satisfy tauri-build's externalBin/resources checks
        run: |
          set -euo pipefail
          cargo build -p gst-video --bin gst-host
          TARGET_TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
          mkdir -p src-tauri/binaries
          cp target/debug/gst-host "src-tauri/binaries/gst-host-${TARGET_TRIPLE}"

          mkdir -p src-tauri/compositor
          echo "placeholder for CI lint only - real bundle is built by scripts/build-avio-compositor-sidecar.ts" \
            > src-tauri/compositor/placeholder.txt

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

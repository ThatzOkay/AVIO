name: diag
on: workflow_dispatch
jobs:
  diag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Probe releases API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST repos/${{ github.repository }}/releases \
            -f tag_name=diag-probe-tmp \
            -f target_commitish=main \
            -f name=diag \
            -F draft=true \
            --include 2>&1 || true

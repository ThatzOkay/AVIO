name: diag
on: workflow_dispatch
jobs:
  diag_pretagged:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: 3f9c2d83eeaa3318f9bfb3175bf9841354c24608
          fetch-depth: 1
      - name: Push tag then create release from it
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          git tag diag-probe-pretagged 3f9c2d83eeaa3318f9bfb3175bf9841354c24608
          git push origin diag-probe-pretagged
          gh release create diag-probe-pretagged --repo ${{ github.repository }} --draft --title diag --notes diag 2>&1 || true
